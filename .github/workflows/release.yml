name: Publicar APK

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: android-actions/setup-android@v3
      - uses: gradle/actions/setup-gradle@v4
      - name: Preparar Gradle
        run: chmod +x gradlew
      - name: Instalar SDK
        run: sdkmanager "platforms;android-36.1" "build-tools;36.1.0"
      - name: Preparar assinatura
        env:
          SIGNING_KEY: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: echo "$SIGNING_KEY" | base64 --decode > "$RUNNER_TEMP/mensageiro.keystore"
      - name: Compilar
        env:
          RELEASE_STORE_FILE: ${{ runner.temp }}/mensageiro.keystore
          RELEASE_STORE_PASSWORD: android
          RELEASE_KEY_ALIAS: androiddebugkey
          RELEASE_KEY_PASSWORD: android
        run: ./gradlew assembleRelease
      - name: Validar versao
        run: |
          VERSION=$(jq -r '.elements[0].versionName' app/build/outputs/apk/release/output-metadata.json)
          test "v$VERSION" = "$GITHUB_REF_NAME"
          cp app/build/outputs/apk/release/app-release.apk Mensageiro.apk
      - name: Publicar release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" Mensageiro.apk --clobber
          else
            gh release create "$GITHUB_REF_NAME" Mensageiro.apk --generate-notes --title "$GITHUB_REF_NAME"
          fi
